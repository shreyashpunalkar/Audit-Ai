version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auditai-postgres
    environment:
      POSTGRES_USER: auditai
      POSTGRES_PASSWORD: auditai123
      POSTGRES_DB: auditai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditai -d auditai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: auditai-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://auditai:auditai123@postgres:5432/auditai_db
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: auditai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
